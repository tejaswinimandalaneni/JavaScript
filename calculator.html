<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorful Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.calculator{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.display{
width:100%;
height:60px;
font-size:24px;
padding:10px;
margin-bottom:15px;
border:none;
background:#f1f1f1;
border-radius:10px;
text-align:right;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
}

button{
height:60px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
color:white;
}

.btn1{background:#ff6b6b;}
.btn2{background:#feca57;}
.btn3{background:#48dbfb;}
.btn4{background:#1dd1a1;}
.btn5{background:#5f27cd;}
.btn6{background:#ee5253;}
.btn7{background:#10ac84;}
.btn8{background:#341f97;}

.equal{
background:#ff9f43;
grid-column: span 2;
}

.clear{
background:#222f3e;
}
</style>
</head>

<body>

<div class="calculator">
<input type="text" id="display" class="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="btn1" onclick="append('/')">/</button>
<button class="btn2" onclick="append('*')">*</button>
<button class="btn3" onclick="append('-')">-</button>

<button class="btn4" onclick="append('7')">7</button>
<button class="btn5" onclick="append('8')">8</button>
<button class="btn6" onclick="append('9')">9</button>
<button class="btn7" onclick="append('+')">+</button>

<button class="btn1" onclick="append('4')">4</button>
<button class="btn2" onclick="append('5')">5</button>
<button class="btn3" onclick="append('6')">6</button>

<button class="btn4" onclick="append('1')">1</button>
<button class="btn5" onclick="append('2')">2</button>
<button class="btn6" onclick="append('3')">3</button>

<button class="btn7" onclick="append('0')">0</button>
<button class="btn8" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>
</div>

<script>
function append(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value = "";
}

function calculate(){
try{
document.getElementById("display").value =
eval(document.getElementById("display").value);
}catch{
alert("Invalid");
}
}
</script>

</body>
</html>
