<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorful To Do List</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#667eea,#764ba2,#ff758c);
}

.container{
background:white;
width:380px;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#764ba2;
margin-bottom:15px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:2px solid #ddd;
outline:none;
}

input:focus{
border-color:#764ba2;
}

.add-btn{
background:linear-gradient(45deg,#667eea,#764ba2);
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.add-btn:hover{
opacity:0.9;
}

ul{
list-style:none;
margin-top:20px;
}

li{
display:flex;
align-items:center;
justify-content:space-between;
background:linear-gradient(45deg,#ffecd2,#fcb69f);
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.task{
flex:1;
margin-left:10px;
}

.completed{
text-decoration: line-through;
color:gray;
}

.delete{
background:#ff4b5c;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.delete:hover{
background:#e63946;
}
</style>

</head>
<body>

<div class="container">
<h2>✨ My To Do List</h2>

<div class="input-box">
<input type="text" id="task" placeholder="Enter your task">
<button class="add-btn" onclick="addTask()">Add</button>
</div>

<ul id="list"></ul>
</div>

<script>
function addTask(){
let task = document.getElementById("task").value;

if(task===""){
alert("Enter task");
return;
}

let li = document.createElement("li");

li.innerHTML = `
<input type="checkbox" onclick="toggleTask(this)">
<span class="task">${task}</span>
<button class="delete" onclick="deleteTask(this)">Delete</button>
`;

document.getElementById("list").appendChild(li);
document.getElementById("task").value="";
}

function deleteTask(btn){
btn.parentElement.remove();
}

function toggleTask(check){
check.nextElementSibling.classList.toggle("completed");
}
</script>

</body>
</html>
