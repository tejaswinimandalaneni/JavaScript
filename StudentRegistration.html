<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Form</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
padding:30px;
}

.container{
background:white;
padding:20px;
border-radius:15px;
max-width:800px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
color:#764ba2;
}

.form-group{
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.add{
background:#667eea;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.clear{
background:#ff4757;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#764ba2;
color:white;
padding:10px;
}

td{
padding:10px;
background:#f4f4f4;
text-align:center;
}

.delete{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Registration Form</h2>

<div class="form-group">
<input type="text" id="name" placeholder="Student Name">
</div>

<div class="form-group">
<input type="text" id="roll" placeholder="Roll Number">
</div>

<div class="form-group">
<input type="text" id="course" placeholder="Course">
</div>

<div class="buttons">
<button class="add" onclick="addStudent()">Add Student</button>
<button class="clear" onclick="clearForm()">Clear</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Course</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>
</table>

</div>

<script>
function addStudent(){

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;
let course=document.getElementById("course").value;

if(name=="" || roll=="" || course==""){
alert("Fill all fields");
return;
}

let row=`
<tr>
<td>${name}</td>
<td>${roll}</td>
<td>${course}</td>
<td><button class="delete" onclick="deleteRow(this)">Delete</button></td>
</tr>
`;

document.getElementById("studentList").innerHTML+=row;

clearForm();
}

function deleteRow(btn){
btn.parentElement.parentElement.remove();
}

function clearForm(){
document.getElementById("name").value="";
document.getElementById("roll").value="";
document.getElementById("course").value="";
}
</script>

</body>
</html>
